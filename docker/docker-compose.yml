services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: enterprise-rag-backend:local
    container_name: enterprise-rag-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      # Persist Chroma vectors + SQLite DB across container restarts
      - rag_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: python:3.12-slim
    container_name: enterprise-rag-frontend
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501"
    environment:
      BACKEND_URL: http://backend:8000
      BACKEND_API_KEY: ${BACKEND_API_KEY:-change-me-to-a-random-secret}
    ports:
      - "8501:8501"
    volumes:
      - ..:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rag_data:
